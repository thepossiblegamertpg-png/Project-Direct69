<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thought Categories Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6f8;
            min-height: 100vh;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        
        h1 .flame {
            display: inline-block;
            animation: flameGlow 2s ease-in-out infinite, flamePulse 1s ease-in-out infinite;
            filter: drop-shadow(0 0 8px #ff6b35) drop-shadow(0 0 16px #ff9f1c);
        }
        
        h1 .title-text {
            display: inline-block;
            animation: textPulse 2s ease-in-out infinite;
            background: linear-gradient(90deg, #ff6b35, #ff9f1c, #ffbe0b, #ff9f1c, #ff6b35);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @keyframes flameGlow {
            0%, 100% { filter: drop-shadow(0 0 8px #ff6b35) drop-shadow(0 0 16px #ff9f1c); }
            50% { filter: drop-shadow(0 0 12px #ff6b35) drop-shadow(0 0 24px #ff9f1c) drop-shadow(0 0 32px #ffbe0b); }
        }
        
        @keyframes flamePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes textPulse {
            0%, 100% { 
                transform: scale(1);
                background-position: 0% 50%;
            }
            50% { 
                transform: scale(1.02);
                background-position: 100% 50%;
            }
        }
        
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            color: white;
        }
        
        .score-item {
            text-align: center;
        }
        
        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 4px;
        }
        
        .score-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .score-value.total { color: #00d4ff; }
        .score-value.high { color: #eb5a46; }
        .score-value.medium { color: #f2d600; }
        .score-value.low { color: #61bd4f; }
        
        .score-breakdown {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 5px;
            font-size: 11px;
            color: #888;
        }
        
        .score-breakdown span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .points-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #61bd4f;
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 32px;
            font-weight: 700;
            animation: popIn 0.5s ease-out, fadeOut 0.5s ease-in 1.5s forwards;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(97, 189, 79, 0.5);
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            70% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        .board {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        
        .column {
            background: #ebecf0;
            border-radius: 8px;
            min-width: 280px;
            max-width: 280px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        
        .column-header {
            font-weight: 600;
            color: #172b4d;
            padding: 8px 4px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .column.color-1 .column-header { color: #61bd4f; }
        .column.color-2 .column-header { color: #f2d600; }
        .column.color-3 .column-header { color: #ff9f1a; }
        .column.color-4 .column-header { color: #eb5a46; }
        .column.color-5 .column-header { color: #c377e0; }
        
        .thoughts {
            min-height: 100px;
            flex: 1;
        }
        
        .thought-card {
            background: white;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-size: 14px;
            color: #333;
            word-wrap: break-word;
            border-left: 4px solid #ccc;
        }
        
        .thought-card:hover {
            background: #f8f9fa;
        }
        
        .thought-card.priority-high { border-left-color: #eb5a46; }
        .thought-card.priority-medium { border-left-color: #f2d600; }
        .thought-card.priority-low { border-left-color: #61bd4f; }
        
        .priority-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 3px;
            margin-bottom: 6px;
        }
        
        .priority-badge.p-1, .priority-badge.p-2, .priority-badge.p-3 { background: #eb5a46; color: white; }
        .priority-badge.p-4, .priority-badge.p-5, .priority-badge.p-6 { background: #f2d600; color: #333; }
        .priority-badge.p-7, .priority-badge.p-8, .priority-badge.p-9, .priority-badge.p-10 { background: #61bd4f; color: white; }
        
        .thought-text {
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        
        .thought-text input[type="checkbox"] {
            margin-top: 3px;
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #61bd4f;
        }
        
        .thought-text .text-content {
            flex: 1;
        }
        
        .thought-card.completed {
            opacity: 0.6;
        }
        
        .thought-card.completed .text-content {
            text-decoration: line-through;
            color: #888;
        }
        
        .add-thought {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px;
            color: #5e6c84;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }
        
        .add-thought:hover {
            background: rgba(0,0,0,0.08);
            color: #333;
        }
        
        .add-form {
            display: none;
            flex-direction: column;
            gap: 8px;
        }
        
        .add-form.active {
            display: flex;
        }
        
        .add-form input[type="text"] {
            padding: 8px;
            border: 2px solid #0079bf;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        
        .add-form .priority-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .add-form label {
            font-size: 12px;
            color: #5e6c84;
        }
        
        .add-form input[type="number"] {
            width: 60px;
            padding: 6px;
            border: 2px solid #0079bf;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        
        .add-form button {
            padding: 6px 12px;
            background: #0079bf;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .add-form button:hover {
            background: #026aa7;
        }
        
        .add-form .cancel {
            background: #6b778c;
        }
        
        .add-form .cancel:hover {
            background: #5e6c84;
        }
        
        .thought-actions {
            display: none;
            gap: 4px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }
        
        .thought-card:hover .thought-actions {
            display: flex;
        }
        
        .thought-actions button {
            padding: 4px 8px;
            font-size: 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background: #dfe1e6;
            color: #42526e;
        }
        
        .thought-actions button:hover {
            background: #c1c7d0;
        }
        
        .delete-btn:hover {
            background: #eb5a46 !important;
            color: white !important;
        }
        
        .priority-selector {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .priority-selector button {
            width: 24px;
            height: 24px;
            padding: 0;
            font-size: 14px;
            border-radius: 50%;
        }
        
        .priority-selector span {
            min-width: 24px;
            text-align: center;
            font-weight: 600;
        }
        
        .legend {
            text-align: center;
            margin-bottom: 20px;
            font-size: 12px;
            color: #5e6c84;
        }
        
        .legend span {
            margin: 0 8px;
        }
        
        .legend .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <h1><span class="flame">🔥</span> <span class="title-text">Thought Categories Board</span></h1>
    <div class="scoreboard">
        <div class="score-item">
            <div class="score-label">Total Score</div>
            <div class="score-value total" id="total-score">0</div>
            <div class="score-breakdown">
                <span><span class="dot" style="background:#eb5a46"></span><span id="high-count">0</span> high</span>
                <span><span class="dot" style="background:#f2d600"></span><span id="medium-count">0</span> med</span>
                <span><span class="dot" style="background:#61bd4f"></span><span id="low-count">0</span> low</span>
            </div>
        </div>
        <div class="score-item">
            <div class="score-label">High Priority</div>
            <div class="score-value high" id="high-score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">Medium Priority</div>
            <div class="score-value medium" id="medium-score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">Low Priority</div>
            <div class="score-value low" id="low-score">0</div>
        </div>
    </div>
    <div class="legend">
        <span><span class="dot" style="background:#eb5a46"></span>High (1-3)</span>
        <span><span class="dot" style="background:#f2d600"></span>Medium (4-6)</span>
        <span><span class="dot" style="background:#61bd4f"></span>Low (7-10)</span>
    </div>
    <div class="board">
        <div class="column color-1">
            <div class="column-header">💡 Ideas</div>
            <div class="thoughts" id="ideas"></div>
            <div class="add-thought" onclick="showForm('ideas')">+ Add thought</div>
            <div class="add-form" id="ideas-form">
                <input type="text" id="ideas-input" placeholder="Enter thought...">
                <div class="priority-row">
                    <label>Priority (1-10):</label>
                    <input type="number" id="ideas-priority" min="1" max="10" value="5">
                </div>
                <button onclick="addThought('ideas')">Add</button>
                <button class="cancel" onclick="hideForm('ideas')">Cancel</button>
            </div>
        </div>
        
        <div class="column color-2">
            <div class="column-header">✓ Tasks</div>
            <div class="thoughts" id="tasks"></div>
            <div class="add-thought" onclick="showForm('tasks')">+ Add thought</div>
            <div class="add-form" id="tasks-form">
                <input type="text" id="tasks-input" placeholder="Enter thought...">
                <div class="priority-row">
                    <label>Priority (1-10):</label>
                    <input type="number" id="tasks-priority" min="1" max="10" value="5">
                </div>
                <button onclick="addThought('tasks')">Add</button>
                <button class="cancel" onclick="hideForm('tasks')">Cancel</button>
            </div>
        </div>
        
        <div class="column color-3">
            <div class="column-header">❓ Questions</div>
            <div class="thoughts" id="questions"></div>
            <div class="add-thought" onclick="showForm('questions')">+ Add thought</div>
            <div class="add-form" id="questions-form">
                <input type="text" id="questions-input" placeholder="Enter thought...">
                <div class="priority-row">
                    <label>Priority (1-10):</label>
                    <input type="number" id="questions-priority" min="1" max="10" value="5">
                </div>
                <button onclick="addThought('questions')">Add</button>
                <button class="cancel" onclick="hideForm('questions')">Cancel</button>
            </div>
        </div>
        
        <div class="column color-4">
            <div class="column-header">📁 Projects</div>
            <div class="thoughts" id="projects"></div>
            <div class="add-thought" onclick="showForm('projects')">+ Add thought</div>
            <div class="add-form" id="projects-form">
                <input type="text" id="projects-input" placeholder="Enter thought...">
                <div class="priority-row">
                    <label>Priority (1-10):</label>
                    <input type="number" id="projects-priority" min="1" max="10" value="5">
                </div>
                <button onclick="addThought('projects')">Add</button>
                <button class="cancel" onclick="hideForm('projects')">Cancel</button>
            </div>
        </div>
        
        <div class="column color-5">
            <div class="column-header">🌙 Someday</div>
            <div class="thoughts" id="someday"></div>
            <div class="add-thought" onclick="showForm('someday')">+ Add thought</div>
            <div class="add-form" id="someday-form">
                <input type="text" id="someday-input" placeholder="Enter thought...">
                <div class="priority-row">
                    <label>Priority (1-10):</label>
                    <input type="number" id="someday-priority" min="1" max="10" value="8">
                </div>
                <button onclick="addThought('someday')">Add</button>
                <button class="cancel" onclick="hideForm('someday')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const categories = ['ideas', 'tasks', 'questions', 'projects', 'someday'];
        
        let scores = {
            total: 0,
            high: 0,
            medium: 0,
            low: 0,
            highCount: 0,
            mediumCount: 0,
            lowCount: 0
        };
        
        function getPoints(priority) {
            if (priority <= 3) return 11 - priority;
            if (priority <= 6) return 7 - priority;
            return 4;
        }
        
        function updateScoreboard() {
            document.getElementById('total-score').textContent = scores.total;
            document.getElementById('high-score').textContent = scores.high;
            document.getElementById('medium-score').textContent = scores.medium;
            document.getElementById('low-score').textContent = scores.low;
            document.getElementById('high-count').textContent = scores.highCount;
            document.getElementById('medium-count').textContent = scores.mediumCount;
            document.getElementById('low-count').textContent = scores.lowCount;
        }
        
        function showPointsPopup(points) {
            const popup = document.createElement('div');
            popup.className = 'points-popup';
            popup.textContent = `+${points}`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 2000);
        }
        
        function showForm(category) {
            document.getElementById(`${category}-form`).classList.add('active');
            document.getElementById(`${category}-input`).focus();
        }
        
        function hideForm(category) {
            document.getElementById(`${category}-form`).classList.remove('active');
            document.getElementById(`${category}-input`).value = '';
        }
        
        function getPriorityClass(priority) {
            if (priority <= 3) return 'priority-high';
            if (priority <= 6) return 'priority-medium';
            return 'priority-low';
        }
        
        function addThought(category) {
            const input = document.getElementById(`${category}-input`);
            const priorityInput = document.getElementById(`${category}-priority`);
            const text = input.value.trim();
            const priority = Math.max(1, Math.min(10, parseInt(priorityInput.value) || 5));
            
            if (text) {
                const container = document.getElementById(category);
                const card = document.createElement('div');
                card.className = `thought-card ${getPriorityClass(priority)}`;
                card.dataset.priority = priority;
                card.innerHTML = `
                    <div class="priority-badge p-${priority}">P${priority}</div>
                    <div class="thought-text">
                        <input type="checkbox" onchange="toggleComplete(this)">
                        <span class="text-content">${text}</span>
                    </div>
                    <div class="thought-actions">
                        <div class="priority-selector">
                            <button onclick="changePriority(this, -1)">-</button>
                            <span class="priority-val">${priority}</span>
                            <button onclick="changePriority(this, 1)">+</button>
                        </div>
                        <button class="delete-btn" onclick="this.parentElement.parentElement.remove()">Delete</button>
                    </div>
                `;
                container.appendChild(card);
                sortByPriority(container);
                hideForm(category);
            }
        }
        
        function changePriority(btn, delta) {
            const card = btn.closest('.thought-card');
            const span = card.querySelector('.priority-val');
            let priority = parseInt(span.textContent) + delta;
            priority = Math.max(1, Math.min(10, priority));
            span.textContent = priority;
            card.dataset.priority = priority;
            
            card.classList.remove('priority-high', 'priority-medium', 'priority-low');
            card.classList.add(getPriorityClass(priority));
            
            const badge = card.querySelector('.priority-badge');
            badge.className = `priority-badge p-${priority}`;
            badge.textContent = `P${priority}`;
            
            sortByPriority(card.parentElement);
        }
        
        function sortByPriority(container) {
            const cards = Array.from(container.children);
            cards.sort((a, b) => {
                return parseInt(a.dataset.priority) - parseInt(b.dataset.priority);
            });
            cards.forEach(card => container.appendChild(card));
        }
        
        function toggleComplete(checkbox) {
            const card = checkbox.closest('.thought-card');
            const priority = parseInt(card.dataset.priority);
            const isCompleting = checkbox.checked;
            
            if (isCompleting) {
                const points = getPoints(priority);
                scores.total += points;
                
                if (priority <= 3) {
                    scores.high += points;
                    scores.highCount++;
                } else if (priority <= 6) {
                    scores.medium += points;
                    scores.mediumCount++;
                } else {
                    scores.low += points;
                    scores.lowCount++;
                }
                
                showPointsPopup(points);
                updateScoreboard();
            } else {
                const points = getPoints(priority);
                scores.total -= points;
                
                if (priority <= 3) {
                    scores.high -= points;
                    scores.highCount--;
                } else if (priority <= 6) {
                    scores.medium -= points;
                    scores.mediumCount--;
                } else {
                    scores.low -= points;
                    scores.lowCount--;
                }
                
                updateScoreboard();
            }
            
            card.classList.toggle('completed', checkbox.checked);
        }
        
        document.querySelectorAll('.add-form input[type="text"]').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const category = this.id.replace('-input', '');
                    addThought(category);
                }
            });
        });
    </script>
</body>
</html>
